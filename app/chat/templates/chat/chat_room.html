{% extends 'base.html' %}
{% load static %}
{% block translationFolder %}data-translation-folder="chat_room"{% endblock %}
{% block title %}chat_room{% endblock %}

{% block content %}
    
    <style>
        .message-bubble {
            max-width: 75%;
            padding: 1rem 1.25rem;
            border-radius: 1.15rem;
            margin-bottom: 1rem;
        }
        .user-message {
            background: #14a44d;
            color: white;
            margin-right: auto;
        }
        .agent-message {
            background: #3b71ca;
            color: white;
            margin-left: auto;
        }
        .chat-timestamp {
            font-size: 0.75rem;
            color: #9fa6b2;
            margin: 0.25rem 0;
        }
        /* Notification badge styles */
        .notification-badge {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
    </style>

    <div class="container py-5" style="max-width: 800px;">
        <!-- Notification badge for unread messages -->
        <div id="unreadNotification" class="notification-badge" style="display: none;">
            <span class="badge rounded-pill bg-danger">
                <i class="fas fa-bell me-1"></i>
                <span id="unreadCount">0</span> <span data-translate="unreadMessages"></span>
            </span>
        </div>
        
        <div class="card shadow-5 rounded-7 overflow-hidden">
            <div class="card-header bg-primary text-white py-3">
                <h2 class="h4 mb-0">
                    <i class="fas fa-comments me-2"></i>
                    <span data-translate="chatRoomHeader"></span> {{ room_code }}
                </h2>
            </div>
    
            <!-- Chat Messages Container -->
            <div class="card-body p-0 bg-secondary">
                <div id="chatBox" class="p-4" style="height: 300px; overflow-y: auto; background: #f8f9fa;">
                    <!-- Messages will be inserted here -->
                </div>
    
                <!-- Chat Controls -->
                <div id="chatControls" class="p-4 bg-white">
                    <div class="input-group mb-3 shadow-2 rounded-4">
                        <input type="text" id="messageInput"
                               class="form-control form-control-lg rounded-start-4"
                               aria-label="<span data-translate='typeMessageAriaLabel'></span>">
                        <button class="btn btn-primary btn-lg rounded-end-4" id="sendButton">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    {% if is_agent %}
                    <button class="btn btn-danger" id="endChatButton">
                        <i class="fas fa-times-circle me-2"></i>
                        <span data-translate="endChat"></span>
                    </button>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden element for translations -->
    <div style="display: none;">
        <span id="confirmEndChatText" data-translate="confirmEndChat">Are you sure you want to end this chat?</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const roomCode = '{{ room_code }}';
            const isAgent = '{{ is_agent|yesno:"true,false" }}' === 'true';
            const chatBox = document.getElementById('chatBox');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const endChatButton = document.getElementById('endChatButton');
            const unreadNotification = document.getElementById('unreadNotification');
            const unreadCount = document.getElementById('unreadCount');
            const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || '';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
            
            let userIsActive = true;
            let localUnreadCount = 0;
            let chatSocket = null;
            let reconnectAttempts = 0;
            let pollingIntervalId = null;
            const maxReconnectAttempts = 2;
            const renderedMessageKeys = new Set();

            connectToWebSocket();
            fetchMessages();

            // Send message when button is clicked
            sendButton.addEventListener('click', sendMessage);

            // Send message when Enter key is pressed
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });

            // End chat when button is clicked
            if (endChatButton) {
                endChatButton.addEventListener('click', function() {
                    const confirmElement = document.getElementById('confirmEndChatText');
                    const confirmMessage = confirmElement ? confirmElement.textContent : 'Are you sure you want to end this chat?';
                    
                    if (confirm(confirmMessage)) {
                        endChat();
                    }
                });
            }
            
            // Track user activity
            document.addEventListener('visibilitychange', function() {
                userIsActive = !document.hidden;
                if (userIsActive) {
                    // Reset local unread count when user becomes active
                    localUnreadCount = 0;
                    updateUnreadNotification();
                }
            });
            
            // Also track focus/blur events
            window.addEventListener('focus', function() {
                userIsActive = true;
                localUnreadCount = 0;
                updateUnreadNotification();
            });
            
            window.addEventListener('blur', function() {
                userIsActive = false;
            });
            
            // Update unread notification badge
            function updateUnreadNotification() {
                if (localUnreadCount > 0) {
                    unreadCount.textContent = localUnreadCount;
                    unreadNotification.style.display = 'block';
                } else {
                    unreadNotification.style.display = 'none';
                }
            }
            
            // Handle unread count updates from server
            function handleUnreadCountUpdate(data) {
                if (data.room_code === roomCode) {
                    if (isAgent) {
                        if (userIsActive) {
                            localUnreadCount = 0;
                        } else {
                            localUnreadCount = data.admin_unread;
                        }
                    } else {
                        if (userIsActive) {
                            localUnreadCount = 0;
                        } else {
                            localUnreadCount = data.user_unread;
                        }
                    }
                    updateUnreadNotification();
                }
            }

            // Function to send a message
            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) {
                    return;
                }

                if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                    chatSocket.send(JSON.stringify({
                        'message': message
                    }));
                    messageInput.value = '';
                    return;
                }

                try {
                    const response = await fetch(`/chat/rooms/${roomCode}/messages/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': csrfToken,
                            'Accept': 'application/json',
                        },
                        body: JSON.stringify({ text: message }),
                    });

                    if (!response.ok) {
                        throw new Error(`Failed to send message (${response.status})`);
                    }

                    const data = await response.json();
                    addMessage(data.text, data.sender, data.is_agent, data.timestamp);
                    messageInput.value = '';
                } catch (error) {
                    console.error('Failed to send message:', error);
                }
            }

            function addMessage(message, sender, isAgentMessage, timestamp = null) {
                const key = `${timestamp || 'local'}|${sender}|${isAgentMessage}|${message}`;
                if (renderedMessageKeys.has(key)) {
                    return;
                }
                renderedMessageKeys.add(key);

                const messageElement = document.createElement('div');
                messageElement.classList.add('message-bubble');
                
                if (isAgentMessage) {
                    messageElement.classList.add('agent-message');
                } else {
                    messageElement.classList.add('user-message');
                }
                
                messageElement.innerHTML = `
                    <div>${message}</div>
                    <div class="chat-timestamp text-end">
                        <small>${sender} • ${formatTimestamp(timestamp)}</small>
                    </div>
                `;
                
                chatBox.appendChild(messageElement);
                scrollToBottom();
            }

            // Function to handle chat ended event
            function handleChatEnded(data) {
                stopPolling();
                const messageElement = document.createElement('div');
                messageElement.classList.add('alert', 'alert-warning', 'text-center', 'my-3');
                messageElement.innerHTML = `
                    <i class="fas fa-info-circle me-2"></i>
                    <span data-translate="chatEndedBy"></span> ${data.ended_by}
                `;
                
                chatBox.appendChild(messageElement);
                scrollToBottom();
                
                // Disable input
                messageInput.disabled = true;
                sendButton.disabled = true;
                if (endChatButton) {
                    endChatButton.disabled = true;
                }
                
                // Redirect to home after a delay
                setTimeout(function() {
                    window.location.href = '/';
                }, 5000);
            }

            // Function to handle error messages
            function handleError(data) {
                stopPolling();
                const messageElement = document.createElement('div');
                messageElement.classList.add('alert', 'alert-danger', 'text-center', 'my-3');
                messageElement.innerHTML = `
                    <i class="fas fa-exclamation-triangle me-2"></i>
                    ${data.message}
                `;
                
                chatBox.appendChild(messageElement);
                scrollToBottom();
                
                // Disable input
                messageInput.disabled = true;
                sendButton.disabled = true;
                if (endChatButton) {
                    endChatButton.disabled = true;
                }
                
                // Redirect to home after a delay
                setTimeout(function() {
                    window.location.href = '/';
                }, 5000);
            }

            // Function to scroll to the bottom of the chat box
            function scrollToBottom() {
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            function formatTimestamp(timestamp) {
                if (!timestamp) {
                    return new Date().toLocaleTimeString();
                }
                return new Date(timestamp).toLocaleTimeString();
            }

            function connectToWebSocket() {
                chatSocket = new WebSocket(
                    wsProtocol + window.location.host + '/ws/chat/' + roomCode + '/'
                );

                chatSocket.onmessage = function(e) {
                    const data = JSON.parse(e.data);
                    
                    if (data.type === 'chat_ended') {
                        handleChatEnded(data);
                    } else if (data.type === 'error') {
                        handleError(data);
                    } else if (data.type === 'unread_count_update') {
                        handleUnreadCountUpdate(data);
                    } else {
                        addMessage(data.message, data.sender, data.is_agent);
                        
                        if (!userIsActive && ((isAgent && !data.is_agent) || (!isAgent && data.is_agent))) {
                            localUnreadCount++;
                            updateUnreadNotification();
                        }
                    }
                };

                chatSocket.onopen = function() {
                    reconnectAttempts = 0;
                    stopPolling();
                };

                chatSocket.onclose = function() {
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts += 1;
                        setTimeout(connectToWebSocket, 3000);
                    } else {
                        startPolling();
                    }
                };

                chatSocket.onerror = function(e) {
                    console.error('Chat WebSocket error:', e);
                };
            }

            function startPolling() {
                if (pollingIntervalId) {
                    return;
                }
                pollingIntervalId = setInterval(() => {
                    fetchMessages();
                    fetchRoomStatus();
                }, 4000);
            }

            function stopPolling() {
                if (!pollingIntervalId) {
                    return;
                }
                clearInterval(pollingIntervalId);
                pollingIntervalId = null;
            }

            async function fetchMessages() {
                try {
                    const response = await fetch('/chat/rooms/' + roomCode + '/messages/', {
                        headers: { 'Accept': 'application/json' },
                    });
                    if (!response.ok) {
                        throw new Error(`Failed to load messages (${response.status})`);
                    }
                    const data = await response.json();
                    data.forEach(msg => {
                        addMessage(msg.text, msg.sender, msg.is_agent, msg.timestamp);
                    });
                    scrollToBottom();
                } catch (error) {
                    console.error('Failed to fetch messages:', error);
                }
            }

            async function fetchRoomStatus() {
                try {
                    const response = await fetch(`/chat/rooms/${roomCode}/status/`, {
                        headers: { 'Accept': 'application/json' },
                    });
                    if (response.status === 404) {
                        handleError({ message: 'This chat room no longer exists.' });
                        return;
                    }
                    if (!response.ok) {
                        throw new Error(`Failed to fetch room status (${response.status})`);
                    }
                    const data = await response.json();
                    if (data.status === 'finished') {
                        handleChatEnded({ ended_by: 'support team' });
                        return;
                    }
                    handleUnreadCountUpdate({
                        room_code: roomCode,
                        admin_unread: data.admin_unread_count || 0,
                        user_unread: data.user_unread_count || 0,
                    });
                } catch (error) {
                    console.error('Failed to fetch room status:', error);
                }
            }

            async function endChat() {
                if (chatSocket && chatSocket.readyState === WebSocket.OPEN) {
                    chatSocket.send(JSON.stringify({
                        'type': 'end_chat'
                    }));
                    return;
                }

                try {
                    const response = await fetch(`/chat/rooms/${roomCode}/end/`, {
                        method: 'POST',
                        headers: {
                            'X-CSRFToken': csrfToken,
                            'Accept': 'application/json',
                        },
                    });
                    if (!response.ok) {
                        throw new Error(`Failed to end chat (${response.status})`);
                    }
                    handleChatEnded({ ended_by: 'support team' });
                } catch (error) {
                    console.error('Failed to end chat:', error);
                }
            }
        });
    </script>
{% endblock %}
